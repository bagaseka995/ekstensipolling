<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Polling IconNet</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      min-height: 420px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0e0;
      padding: 20px;
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .header .logo {
      font-size: 32px;
      margin-bottom: 6px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
    }

    /* ===== CARD ===== */
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      backdrop-filter: blur(8px);
    }
    .card label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* ===== TEXTAREA ===== */
    #emailList {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(167,139,250,0.4);
      border-radius: 10px;
      padding: 10px 12px;
      color: #e0e0e0;
      font-size: 13px;
      font-family: 'Consolas', monospace;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.6;
    }
    #emailList::placeholder { color: #6b7280; }
    #emailList:focus {
      outline: none;
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167,139,250,0.2);
    }

    /* ===== FORM URL ===== */
    #formUrl {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(96,165,250,0.4);
      border-radius: 10px;
      padding: 10px 12px;
      color: #e0e0e0;
      font-size: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #formUrl::placeholder { color: #6b7280; }
    #formUrl:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96,165,250,0.2);
    }

    /* ===== COUNTER BADGE ===== */
    .counter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    #emailCount {
      font-size: 11px;
      color: #9ca3af;
    }
    #emailCount span {
      color: #a78bfa;
      font-weight: 700;
    }

    /* ===== STATUS ===== */
    #statusBox {
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.5;
      min-height: 44px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .status-idle    { color: #9ca3af; }
    .status-running { color: #34d399; }
    .status-warning { color: #fbbf24; }
    .status-done    { color: #60a5fa; }
    .status-error   { color: #f87171; }

    /* ===== PROGRESS BAR ===== */
    .progress-wrap {
      margin-top: 8px;
      background: rgba(0,0,0,0.3);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }
    #progressBar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    #progressLabel {
      font-size: 11px;
      color: #9ca3af;
      text-align: right;
      margin-top: 4px;
    }

    /* ===== BUTTONS ===== */
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    button {
      flex: 1;
      padding: 11px 0;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      letter-spacing: 0.3px;
    }
    button:active { transform: scale(0.97); }

    #btnStart {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      box-shadow: 0 4px 15px rgba(124,58,237,0.4);
    }
    #btnStart:hover { box-shadow: 0 6px 20px rgba(124,58,237,0.6); }
    #btnStart:disabled { opacity: 0.4; cursor: not-allowed; }

    #btnStop {
      background: rgba(239,68,68,0.15);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.35);
    }
    #btnStop:hover { background: rgba(239,68,68,0.25); }
    #btnStop:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      font-size: 10px;
      color: #4b5563;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">🤖</div>
    <h1>Polling IconNet</h1>
    <p>Batch Processing &amp; Auto-Screenshot</p>
  </div>

  <!-- Daftar Email -->
  <div class="card">
    <label for="emailList">📧 Daftar Email (satu per baris)</label>
    <textarea
      id="emailList"
      rows="6"
      placeholder="email1@gmail.com&#10;email2@gmail.com&#10;email3@gmail.com"
    ></textarea>
    <div class="counter-row">
      <div id="emailCount">Terdeteksi: <span id="countNum">0</span> email</div>
    </div>
  </div>

<!-- Status & Progress -->
  <div class="card">
    <label>📊 Status & Progress</label>
    <div id="statusBox" class="status-idle">Menunggu untuk dimulai...</div>
    <div class="progress-wrap"><div id="progressBar"></div></div>
    <div id="progressLabel">0 / 0</div>
  </div>

  <!-- Tombol Aksi -->
  <div class="btn-group">
    <button id="btnStart">▶ Mulai Batch</button>
    <button id="btnStop" disabled>⏹ Hentikan</button>
  </div>

  <div class="footer">v2.0 — Batch Mode &amp; Auto-Screenshot</div>

  <script src="popup.js"></script>
</body>
</html>
